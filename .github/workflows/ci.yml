# =============================================================
# BuggyBooks – Continuous Integration Workflow
#
# Runs on every push and pull request to main.
# Jobs:
#   backend-tests  — runs Jest unit/integration tests
#   frontend-tests — runs Vitest component tests
# =============================================================

name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------
  # Job 1: Backend Tests (Jest)
  # -----------------------------------------------------------
  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-do-not-use-in-production

  # -----------------------------------------------------------
  # Job 2: Frontend Tests (Vitest)
  # -----------------------------------------------------------
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest tests
        run: npm test
        env:
          VITE_API_URL: http://localhost:4000/api

  # -----------------------------------------------------------
  # Job 3: TypeScript Build Verification (Backend)
  # -----------------------------------------------------------
  backend-build:
    name: Backend TypeScript Build
    runs-on: ubuntu-latest
    needs: backend-tests

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build
        env:
          JWT_SECRET: ci-test-secret-do-not-use-in-production
