name: Playwright Automation CI

on:
  workflow_dispatch:
    inputs:
      headless:
        description: 'Run browser in headless mode (true or false)'
        required: false
        default: 'true'
      branch:
        description: 'Git branch to checkout for this run'
        required: false
        default: 'main'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # JOB 1: Run Sharded Tests
  test:
    name: UI & API Automation
    runs-on: ubuntu-latest
    
    env:
      ENV: INTEROP
      BASE_URL: https://buggy-books-fe.onrender.com/
      API_BASE_URL: https://buggy-books.onrender.com
      HEADLESS: ${{ github.event.inputs.headless }}
      BROWSER: chrome
      USER_NAME: ${{ secrets.E2E_USER_NAME }}
      PASSWORD: ${{ secrets.E2E_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Install dependencies
        working-directory: playwright-e2e
        run: |
          npm ci
          npx playwright install --with-deps chrome

      - name: Run tests
        working-directory: playwright-e2e
        env:
          ENVIRONMENT: INTEROP
          TZ: Australia/Adelaide
          USER_NAME: ${{ secrets.E2E_USER_NAME }}
          PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          npm run test
        continue-on-error: true

      # Explicitly upload the allure-results folder
      # Ensure your playwright.config.ts is actually outputting to 'playwright-e2e/reports/allure-results'
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
         name: allure-results
         path: playwright-e2e/reports/allure-results


  # JOB 2: Merge and Deploy
  deploy-report:
    name: Deploy Allure Report
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # 1. Get history for trends
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # 2. Download the artifact to a specific, known folder
      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results # This creates a folder named 'allure-results' in the root

      - name: Test Report
        run: |
          echo "- **Report Link:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/AutomationReports/CI/${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

      # 3. Generate the single consolidated report. Point the generator to the folder we just downloaded
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 7
          subfolder: AutomationReports/CI

      # 4. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true

      # 5. Print GitHub Pages URL
      - name: Print Report URL
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          echo "✅ Report published successfully!"
          echo "📊 Report URL: https://${OWNER}.github.io/${REPO_NAME}/AutomationReports/CI/${{ github.run_number }}"
          echo "📈 Check the job summary for detailed test results."
