# =============================================================
# BuggyBooks – Docker Compose
#
# Starts both the backend API and frontend UI with one command:
#   docker-compose up --build
#
# Services:
#   backend  — Node.js / Express API on port 4000
#   frontend — Nginx-served Vite build on port 5173
# =============================================================

version: "3.9"

services:
  # -----------------------------------------------------------
  # Backend: Node.js + Express + Socket.io
  # -----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: buggy-books-backend
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-buggy-books-local-dev-secret}
    volumes:
      # Persist db.json state across restarts (optional; remove for full reset on restart)
      - backend-data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/books"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -----------------------------------------------------------
  # Frontend: Vite build served via Nginx
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: http://localhost:4000/api
    container_name: buggy-books-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
